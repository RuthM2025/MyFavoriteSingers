<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Singers</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="container py-5">
      <h1 class="display-6 fw-bold mb-4 text-center">My Favorite Singers</h1>
      <div class="row g-4 align-items-start">
        <div class="col-sm-4">
          <img
            src="music.jpg"
            alt="Musicians performing on stage"
            class="img-fluid card-image w-100"
          />
        </div>

        <div class="col-sm-8">
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th scope="col">Singer</th>
                  <th scope="col">Country</th>
                  <th scope="col">Best Song</th>
                  <th scope="col">DOB</th>
                </tr>
              </thead>
              <tbody id="singerTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
